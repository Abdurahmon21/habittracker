<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT + IELTS Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --card: #161616; --card-hover: #1f1f1f;
    --text: #ededed; --text-dim: #888; --border: #2a2a2a;
    --accent: #3b82f6; --success: #10b981; --warning: #f59e0b;
    --sat: #8b5cf6; --ielts: #06b6d4;
  }
  [data-theme="light"] {
    --bg: #fafafa; --card: #fff; --card-hover: #f3f4f6;
    --text: #111; --text-dim: #666; --border: #e5e7eb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 20px; transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  h1 { font-size: 28px; font-weight: 700; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px;
    transition: all 0.2s;
  }
  button:hover { background: var(--card-hover); transform: translateY(-1px); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .user-bar {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); padding: 10px 16px; border-radius: 10px;
    border: 1px solid var(--border); margin-bottom: 20px; font-size: 14px;
  }
  .user-bar .email { color: var(--text-dim); flex: 1; }
  .sync-status { font-size: 12px; color: var(--text-dim); }
  .sync-status.syncing { color: var(--warning); }
  .sync-status.synced { color: var(--success); }
  .stats {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card); padding: 16px; border-radius: 12px;
    border: 1px solid var(--border); text-align: center;
  }
  .stat .value { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .progress-bar {
    height: 8px; background: var(--card); border-radius: 4px;
    overflow: hidden; margin-bottom: 24px; border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--sat), var(--ielts));
    transition: width 0.5s;
  }
  .filters {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .chip {
    padding: 6px 12px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid var(--border); background: var(--card);
  }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .phase-header {
    font-size: 13px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px;
  }
  .day {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 10px;
    cursor: pointer; transition: all 0.2s;
  }
  .day:hover { background: var(--card-hover); border-color: var(--accent); }
  .day.today { border-color: var(--accent); border-width: 2px; }
  .day.done { opacity: 0.6; }
  .day-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; flex-wrap: wrap; gap: 8px;
  }
  .day-title { font-weight: 600; font-size: 15px; }
  .day-date { font-size: 12px; color: var(--text-dim); }
  .badge {
    padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600;
  }
  .badge.sat { background: rgba(139, 92, 246, 0.2); color: var(--sat); }
  .badge.ielts { background: rgba(6, 182, 212, 0.2); color: var(--ielts); }
  .mini-progress {
    height: 4px; background: var(--border); border-radius: 2px;
    overflow: hidden; margin-top: 8px;
  }
  .mini-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card); border-radius: 16px; padding: 24px;
    max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .modal h2 { margin-bottom: 16px; }
  .task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px; border-radius: 8px; margin-bottom: 6px;
    cursor: pointer; transition: background 0.2s;
  }
  .task:hover { background: var(--card-hover); }
  .task input[type="checkbox"] {
    width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;
  }
  .task label { cursor: pointer; flex: 1; font-size: 14px; }
  .task.done label { text-decoration: line-through; color: var(--text-dim); }
  .task .delete-task {
    background: transparent; border: none; color: var(--text-dim);
    cursor: pointer; padding: 2px 6px; opacity: 0; transition: opacity 0.2s;
  }
  .task:hover .delete-task { opacity: 1; }
  .add-task-row {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .add-task-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 14px;
  }
  textarea.notes {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px; border-radius: 8px; font-size: 14px;
    min-height: 80px; margin-top: 12px; resize: vertical; font-family: inherit;
  }
  .modal-actions {
    display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px;
  }
  .login-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; gap: 20px; text-align: center;
  }
  .login-screen h1 { font-size: 36px; }
  .login-screen p { color: var(--text-dim); max-width: 400px; }
  .google-btn {
    background: white; color: #333; padding: 12px 24px;
    border-radius: 10px; font-weight: 600; display: flex;
    align-items: center; gap: 10px; border: none; font-size: 15px;
  }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--card); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 10px; z-index: 200;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  .hidden { display: none !important; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 22px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat .value { font-size: 20px; }
  }
  @media (max-width: 380px) {
    .stats { grid-template-columns: 1fr 1fr; gap: 8px; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
  <h1>📚 SAT + IELTS Tracker</h1>
  <p>22 kunlik intensiv reja. Google bilan kirib, ma'lumotlaringizni har qanday qurilmada sinxronlashtiring.</p>
  <button class="google-btn" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
</div>

<!-- APP -->
<div id="app" class="container hidden">
  <header>
    <h1>📚 SAT + IELTS Tracker</h1>
    <div class="controls">
      <button id="themeBtn" title="Theme (T)">🌙</button>
      <button id="notifBtn" title="Notifications (N)">🔔</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="user-bar">
    <span>👤</span>
    <span class="email" id="userEmail"></span>
    <span class="sync-status" id="syncStatus">●</span>
  </div>

  <div class="stats">
    <div class="stat"><div class="value" id="dayNum">0/22</div><div class="label">Day</div></div>
    <div class="stat"><div class="value" id="overallPct">0%</div><div class="label">Overall</div></div>
    <div class="stat"><div class="value" id="streakNum">0</div><div class="label">Streak 🔥</div></div>
    <div class="stat"><div class="value" id="bestStreakNum">0</div><div class="label">Best</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="filters">
    <div class="chip active" data-filter="all">All</div>
    <div class="chip" data-filter="sat">SAT</div>
    <div class="chip" data-filter="ielts">IELTS</div>
    <div class="chip" data-filter="today">Today</div>
    <div class="chip" data-filter="incomplete">Incomplete</div>
  </div>

  <div id="daysList"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Day</h2>
    <div id="modalDate" style="color: var(--text-dim); font-size: 13px; margin-bottom: 16px;"></div>
    <div id="tasksList"></div>
    <div class="add-task-row">
      <input type="text" id="newTaskInput" placeholder="Add custom task..." />
      <button class="primary" onclick="addCustomTask()">Add</button>
    </div>
    <textarea class="notes" id="dayNotes" placeholder="Notes for this day..."></textarea>
    <div class="modal-actions">
      <button onclick="closeModal()">Close (Esc)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== CONFIG ====================
const SUPABASE_URL = 'https://zpifggpsmacyszldjkih.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpwaWZnZ3BzbWFjeXN6bGRqa2loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODI3NDgsImV4cCI6MjA5NTU1ODc0OH0.4VERNKvlU42qJTyvxE14CjeCgz--pKbs_aGnLi-aDBk';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ==================== DEFAULT PLAN ====================
const DEFAULT_PLAN = [
  // SAT Focus — 12 days
  { phase: 'SAT', title: 'SAT Day 1 — Reading basics', tasks: ['Read 1 SAT passage', '20 vocab words', '10 Reading questions', 'Review mistakes'] },
  { phase: 'SAT', title: 'SAT Day 2 — Grammar rules', tasks: ['Punctuation rules', '15 grammar questions', '20 vocab words', 'Error log'] },
  { phase: 'SAT', title: 'SAT Day 3 — Math no-calc', tasks: ['Algebra practice', '15 problems', 'Formula review', 'Mistake review'] },
  { phase: 'SAT', title: 'SAT Day 4 — Reading deep', tasks: ['2 passages', 'Evidence questions', '20 vocab', 'Timed practice'] },
  { phase: 'SAT', title: 'SAT Day 5 — Writing transitions', tasks: ['Transition rules', '15 questions', '20 vocab', 'Re-do mistakes'] },
  { phase: 'SAT', title: 'SAT Day 6 — Math calc', tasks: ['Word problems', '15 problems', 'Graph reading', 'Mistake log'] },
  { phase: 'SAT', title: 'SAT Day 7 — Full Reading section', tasks: ['Timed 65-min', 'Review answers', '20 vocab', 'Note weak areas'] },
  { phase: 'SAT', title: 'SAT Day 8 — Full Writing section', tasks: ['Timed 35-min', 'Review answers', 'Rule review', 'Mistake log'] },
  { phase: 'SAT', title: 'SAT Day 9 — Full Math section', tasks: ['No-calc 25min', 'Calc 55min', 'Review', 'Formula review'] },
  { phase: 'SAT', title: 'SAT Day 10 — Mixed review', tasks: ['Weak areas', '30 mixed Qs', '20 vocab', 'Mistake patterns'] },
  { phase: 'SAT', title: 'SAT Day 11 — Full mock test', tasks: ['Full 3-hour test', 'Score it', 'Detailed review', 'Goal: improve'] },
  { phase: 'SAT', title: 'SAT Day 12 — Final review', tasks: ['Review all mistakes', 'Weak spots only', 'Light practice', 'Rest well'] },
  // IELTS Focus — 10 days
  { phase: 'IELTS', title: 'IELTS Day 1 — Listening intro', tasks: ['1 listening test', 'Note types of Qs', 'Review answers', 'Vocab list'] },
  { phase: 'IELTS', title: 'IELTS Day 2 — Reading skim/scan', tasks: ['1 passage', 'Skim techniques', 'T/F/NG practice', '20 vocab'] },
  { phase: 'IELTS', title: 'IELTS Day 3 — Writing Task 1', tasks: ['Graph description', 'Structure review', '1 full essay', 'Self-edit'] },
  { phase: 'IELTS', title: 'IELTS Day 4 — Writing Task 2', tasks: ['Essay structure', '1 full essay', 'Linking words', 'Self-edit'] },
  { phase: 'IELTS', title: 'IELTS Day 5 — Speaking Part 1', tasks: ['Common topics', '15-min practice', 'Record yourself', 'Review'] },
  { phase: 'IELTS', title: 'IELTS Day 6 — Speaking Part 2', tasks: ['Cue cards x3', '2-min answers', 'Record', 'Vocab boost'] },
  { phase: 'IELTS', title: 'IELTS Day 7 — Listening full', tasks: ['Full 30-min test', 'All 4 sections', 'Review', 'Note weak parts'] },
  { phase: 'IELTS', title: 'IELTS Day 8 — Reading full', tasks: ['Full 60-min test', 'All 3 passages', 'Review', 'Time strategy'] },
  { phase: 'IELTS', title: 'IELTS Day 9 — Writing both tasks', tasks: ['Task 1 + Task 2 timed', 'Self-score', 'Review', 'Vocab boost'] },
  { phase: 'IELTS', title: 'IELTS Day 10 — Full mock', tasks: ['Full IELTS test', 'Score it', 'Final review', 'Rest'] }
];

// ==================== STATE ====================
let state = {
  data: {},          // { dayIndex: { tasks: [{text, done}], notes, customTasks: [{text, done}] } }
  startDate: null,
  theme: 'dark',
  notifications: false,
  bestStreak: 0
};
let currentUser = null;
let currentDayIdx = null;
let currentFilter = 'all';
let saveTimer = null;

// ==================== AUTH ====================
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadData();
    showApp();
  } else {
    showLogin();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) {
      currentUser = session.user;
      await loadData();
      showApp();
    } else if (event === 'SIGNED_OUT') {
      currentUser = null;
      showLogin();
    }
  });
}

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.href }
  });
  if (error) toast('Login error: ' + error.message);
}

async function logout() {
  await sb.auth.signOut();
}

function showLogin() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userEmail').textContent = currentUser.email;
  applyTheme();
  render();
}

// ==================== DATA ====================
async function loadData() {
  setSync('syncing');
  try {
    const { data, error } = await sb
      .from('habit_data')
      .select('*')
      .eq('user_id', currentUser.id)
      .maybeSingle();

    if (error) throw error;

    if (data) {
      state.data = data.data || {};
      state.startDate = data.start_date || todayISO();
      state.theme = data.theme || 'dark';
      state.notifications = data.notifications || false;
      state.bestStreak = (data.data && data.data._bestStreak) || 0;
    } else {
      // First-time user — create row
      state.startDate = todayISO();
      state.data = {};
      await saveData(true);
    }
    setSync('synced');
  } catch (e) {
    console.error(e);
    // Fallback to localStorage
    const cached = localStorage.getItem('ht5_' + currentUser.id);
    if (cached) {
      const parsed = JSON.parse(cached);
      state = { ...state, ...parsed };
    }
    setSync('offline');
    toast('Offline mode — saqlanmagan o\'zgarishlar keyinroq sync bo\'ladi');
  }
}

async function saveData(immediate = false) {
  // Always save to localStorage instantly
  localStorage.setItem('ht5_' + currentUser.id, JSON.stringify({
    data: state.data, startDate: state.startDate,
    theme: state.theme, notifications: state.notifications
  }));

  // Debounce Supabase saves (unless immediate)
  if (saveTimer) clearTimeout(saveTimer);
  const delay = immediate ? 0 : 800;
  saveTimer = setTimeout(async () => {
    setSync('syncing');
    try {
      const dataWithMeta = { ...state.data, _bestStreak: state.bestStreak };
      const { error } = await sb.from('habit_data').upsert({
        user_id: currentUser.id,
        data: dataWithMeta,
        start_date: state.startDate,
        theme: state.theme,
        notifications: state.notifications
      });
      if (error) throw error;
      setSync('synced');
    } catch (e) {
      console.error(e);
      setSync('offline');
    }
  }, delay);
}

function setSync(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync-status ' + status;
  el.textContent = status === 'syncing' ? '⟳ syncing...' :
                   status === 'synced' ? '✓ synced' :
                   status === 'offline' ? '⚠ offline' : '●';
}

// ==================== RENDER ====================
function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' });
}

function getDayData(idx) {
  if (!state.data[idx]) {
    state.data[idx] = {
      tasks: DEFAULT_PLAN[idx].tasks.map(t => ({ text: t, done: false })),
      customTasks: [],
      notes: ''
    };
  }
  return state.data[idx];
}

function dayProgress(idx) {
  const d = getDayData(idx);
  const all = [...d.tasks, ...(d.customTasks || [])];
  if (all.length === 0) return 0;
  return all.filter(t => t.done).length / all.length;
}

function todayIdx() {
  if (!state.startDate) return -1;
  const start = new Date(state.startDate + 'T00:00:00');
  const today = new Date(todayISO() + 'T00:00:00');
  const diff = Math.floor((today - start) / 86400000);
  return diff >= 0 && diff < 22 ? diff : -1;
}

function calcStreak() {
  let streak = 0;
  const tIdx = todayIdx();
  if (tIdx < 0) return 0;
  for (let i = tIdx; i >= 0; i--) {
    if (dayProgress(i) >= 1) streak++;
    else break;
  }
  if (streak > state.bestStreak) state.bestStreak = streak;
  return streak;
}

function render() {
  const tIdx = todayIdx();
  const completed = Object.keys(state.data).filter(k => !isNaN(k) && dayProgress(parseInt(k)) >= 1).length;
  const totalTasks = DEFAULT_PLAN.reduce((s, _, i) => {
    const d = getDayData(i);
    return s + d.tasks.length + (d.customTasks?.length || 0);
  }, 0);
  const doneTasks = DEFAULT_PLAN.reduce((s, _, i) => {
    const d = getDayData(i);
    return s + d.tasks.filter(t => t.done).length + (d.customTasks?.filter(t => t.done).length || 0);
  }, 0);
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
  const streak = calcStreak();

  document.getElementById('dayNum').textContent = (tIdx + 1) + '/22';
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('bestStreakNum').textContent = state.bestStreak;
  document.getElementById('progressFill').style.width = pct + '%';

  // Days list
  const list = document.getElementById('daysList');
  list.innerHTML = '';
  let lastPhase = '';
  DEFAULT_PLAN.forEach((day, idx) => {
    // Filter
    if (currentFilter === 'sat' && day.phase !== 'SAT') return;
    if (currentFilter === 'ielts' && day.phase !== 'IELTS') return;
    if (currentFilter === 'today' && idx !== tIdx) return;
    if (currentFilter === 'incomplete' && dayProgress(idx) >= 1) return;

    if (day.phase !== lastPhase && currentFilter === 'all') {
      const h = document.createElement('div');
      h.className = 'phase-header';
      h.textContent = day.phase === 'SAT' ? '🎯 SAT Focus (12 days)' : '🌐 IELTS Focus (10 days)';
      list.appendChild(h);
      lastPhase = day.phase;
    }

    const prog = dayProgress(idx);
    const el = document.createElement('div');
    el.className = 'day' + (idx === tIdx ? ' today' : '') + (prog >= 1 ? ' done' : '');
    el.innerHTML = `
      <div class="day-header">
        <span class="day-title">${day.title}</span>
        <span class="badge ${day.phase.toLowerCase()}">${day.phase}</span>
      </div>
      <div class="day-date">${formatDate(addDays(state.startDate, idx))} • ${Math.round(prog*100)}% done</div>
      <div class="mini-progress"><div class="mini-fill" style="width:${prog*100}%"></div></div>
    `;
    el.onclick = () => openModal(idx);
    list.appendChild(el);
  });

  // Auto-scroll to today on first render
  if (!window._scrolled && tIdx >= 0) {
    setTimeout(() => {
      const todayEl = list.querySelector('.day.today');
      if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      window._scrolled = true;
    }, 100);
  }
}

// ==================== MODAL ====================
function openModal(idx) {
  currentDayIdx = idx;
  const day = DEFAULT_PLAN[idx];
  const d = getDayData(idx);
  document.getElementById('modalTitle').textContent = day.title;
  document.getElementById('modalDate').textContent = formatDate(addDays(state.startDate, idx));
  renderTasks();
  document.getElementById('dayNotes').value = d.notes || '';
  document.getElementById('modal').classList.add('show');
  document.getElementById('newTaskInput').value = '';
}

function renderTasks() {
  const d = getDayData(currentDayIdx);
  const list = document.getElementById('tasksList');
  list.innerHTML = '';
  d.tasks.forEach((t, i) => list.appendChild(taskEl(t, () => toggleTask(i, false))));
  (d.customTasks || []).forEach((t, i) => {
    list.appendChild(taskEl(t, () => toggleTask(i, true), () => deleteCustomTask(i)));
  });
}

function taskEl(task, onToggle, onDelete) {
  const div = document.createElement('div');
  div.className = 'task' + (task.done ? ' done' : '');
  const id = 'task_' + Math.random().toString(36).slice(2);
  div.innerHTML = `
    <input type="checkbox" id="${id}" ${task.done ? 'checked' : ''}>
    <label for="${id}"></label>
  `;
  div.querySelector('label').textContent = task.text;
  div.querySelector('input').onchange = onToggle;
  if (onDelete) {
    const btn = document.createElement('button');
    btn.className = 'delete-task';
    btn.textContent = '✕';
    btn.onclick = (e) => { e.stopPropagation(); onDelete(); };
    div.appendChild(btn);
  }
  return div;
}

function toggleTask(i, isCustom) {
  const d = getDayData(currentDayIdx);
  const arr = isCustom ? d.customTasks : d.tasks;
  arr[i].done = !arr[i].done;
  if (navigator.vibrate) navigator.vibrate(10);
  saveData();
  renderTasks();
  render();
  if (dayProgress(currentDayIdx) >= 1) celebrate();
}

function addCustomTask() {
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if (!text) return;
  const d = getDayData(currentDayIdx);
  if (!d.customTasks) d.customTasks = [];
  d.customTasks.push({ text, done: false });
  input.value = '';
  saveData();
  renderTasks();
  render();
}

function deleteCustomTask(i) {
  const d = getDayData(currentDayIdx);
  d.customTasks.splice(i, 1);
  saveData();
  renderTasks();
  render();
}

function closeModal() {
  // Save notes
  if (currentDayIdx !== null) {
    const d = getDayData(currentDayIdx);
    d.notes = document.getElementById('dayNotes').value;
    saveData();
  }
  document.getElementById('modal').classList.remove('show');
  currentDayIdx = null;
}

// ==================== UI HELPERS ====================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function celebrate() {
  toast('🎉 Day complete!');
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveData();
}

async function toggleNotif() {
  if (!('Notification' in window)) { toast('Notifications not supported'); return; }
  if (Notification.permission === 'default') {
    const p = await Notification.requestPermission();
    if (p !== 'granted') { toast('Permission denied'); return; }
  }
  state.notifications = !state.notifications;
  document.getElementById('notifBtn').textContent = state.notifications ? '🔔' : '🔕';
  toast(state.notifications ? 'Notifications ON' : 'Notifications OFF');
  saveData();
}

// ==================== EVENTS ====================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 't' || e.key === 'T') toggleTheme();
  if (e.key === 'n' || e.key === 'N') toggleNotif();
});

document.getElementById('themeBtn').onclick = toggleTheme;
document.getElementById('notifBtn').onclick = toggleNotif;

document.querySelectorAll('.chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  };
});

document.getElementById('newTaskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addCustomTask();
});

document.getElementById('dayNotes').addEventListener('blur', () => {
  if (currentDayIdx !== null) {
    getDayData(currentDayIdx).notes = document.getElementById('dayNotes').value;
    saveData();
  }
});

// Realtime sync across devices
sb.channel('habit_changes')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'habit_data' }, async (payload) => {
    if (currentUser && payload.new.user_id === currentUser.id) {
      // Skip if it's our own recent update
      const localUpdated = localStorage.getItem('ht5_' + currentUser.id + '_lastWrite');
      if (localUpdated && Date.now() - parseInt(localUpdated) < 2000) return;
      state.data = payload.new.data || {};
      render();
      toast('🔄 Synced from another device');
    }
  })
  .subscribe();

// Daily notification at 9am
setInterval(() => {
  if (!state.notifications) return;
  const now = new Date();
  if (now.getHours() === 9 && now.getMinutes() === 0 && Notification.permission === 'granted') {
    const tIdx = todayIdx();
    if (tIdx >= 0 && dayProgress(tIdx) < 1) {
      new Notification('📚 SAT+IELTS Tracker', {
        body: `Bugun: ${DEFAULT_PLAN[tIdx].title}. Boshla!`
      });
    }
  }
}, 60000);

// Init
init();
</script>
</body>
</html>
