<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT + IELTS Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --card: #161616; --card-hover: #1f1f1f;
    --text: #ededed; --text-dim: #888; --border: #2a2a2a;
    --accent: #3b82f6; --success: #10b981; --warning: #f59e0b;
    --sat: #8b5cf6; --ielts: #06b6d4;
  }
  [data-theme="light"] {
    --bg: #fafafa; --card: #fff; --card-hover: #f3f4f6;
    --text: #111; --text-dim: #666; --border: #e5e7eb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
    padding: 20px; transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 900px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h1 { font-size: 28px; font-weight: 700; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; }
  button { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
  button:hover { background: var(--card-hover); transform: translateY(-1px); }
  button.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .user-bar { display: flex; align-items: center; gap: 12px; background: var(--card); padding: 10px 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; font-size: 14px; }
  .user-bar .email { color: var(--text-dim); flex: 1; }
  .sync-status { font-size: 12px; color: var(--text-dim); }
  .sync-status.syncing { color: var(--warning); }
  .sync-status.synced { color: var(--success); }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--card); padding: 16px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
  .stat .value { font-size: 24px; font-weight: 700; }
  .stat .label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .progress-bar { height: 8px; background: var(--card); border-radius: 4px; overflow: hidden; margin-bottom: 24px; border: 1px solid var(--border); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--sat), var(--ielts)); transition: width 0.5s; }
  .filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .chip { padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: var(--card); }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
  .phase-header { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px; }
  .day { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
  .day:hover { background: var(--card-hover); border-color: var(--accent); }
  .day.today { border-color: var(--accent); border-width: 2px; }
  .day.done { opacity: 0.6; }
  .day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
  .day-title { font-weight: 600; font-size: 15px; }
  .day-date { font-size: 12px; color: var(--text-dim); }
  .badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
  .badge.sat { background: rgba(139, 92, 246, 0.2); color: var(--sat); }
  .badge.ielts { background: rgba(6, 182, 212, 0.2); color: var(--ielts); }
  .mini-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .mini-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border-radius: 16px; padding: 24px; max-width: 500px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
  .modal h2 { margin-bottom: 16px; }
  .task { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 0.2s; }
  .task:hover { background: var(--card-hover); }
  .task input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0; }
  .task label { cursor: pointer; flex: 1; font-size: 14px; }
  .task.done label { text-decoration: line-through; color: var(--text-dim); }
  .task .delete-task { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 2px 6px; opacity: 0; transition: opacity 0.2s; }
  .task:hover .delete-task { opacity: 1; }
  .add-task-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-task-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 14px; }
  textarea.notes { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; font-size: 14px; min-height: 80px; margin-top: 12px; resize: vertical; font-family: inherit; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 20px; text-align: center; }
  .login-screen h1 { font-size: 36px; }
  .login-screen p { color: var(--text-dim); max-width: 400px; }
  .google-btn { background: white; color: #333; padding: 12px 24px; border-radius: 10px; font-weight: 600; display: flex; align-items: center; gap: 10px; border: none; font-size: 15px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px; z-index: 200; opacity: 0; transition: opacity 0.3s, transform 0.3s; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
  .hidden { display: none !important; }
  @media (max-width: 640px) {
    body { padding: 12px; }
    h1 { font-size: 22px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat .value { font-size: 20px; }
  }
  @media (max-width: 380px) {
    .stats { grid-template-columns: 1fr 1fr; gap: 8px; }
  }

  /* ========== RESOURCES SECTION ========== */
  .resources-section { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
  .resources-header { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .resource-topic { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
  .resource-topic-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .resource-cat-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--text-dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .resource-links { display: flex; flex-direction: column; gap: 4px; }
  .resource-link { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; text-decoration: none; color: var(--text); font-size: 13px; transition: background 0.15s; }
  .resource-link:hover { background: var(--card-hover); color: var(--accent); }
  .resource-link-icon { font-size: 14px; flex-shrink: 0; }
  .resource-link-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .resource-external { font-size: 11px; color: var(--text-dim); opacity: 0.6; }
  .no-resources { font-size: 12px; color: var(--text-dim); font-style: italic; padding: 8px; text-align: center; }

</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <h1>📚 SAT + IELTS Tracker</h1>
  <p>22 kunlik intensiv reja. Google bilan kirib, ma'lumotlaringizni har qanday qurilmada sinxronlashtiring.</p>

    Sign in with Google
  </button>
</div>

<div id="app" class="container hidden">
  <header>
    <h1>📚 SAT + IELTS Tracker</h1>
    <div class="controls">
      <button id="themeBtn" title="Theme (T)">🌙</button>
      <button id="notifBtn" title="Notifications (N)">🔔</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="user-bar">
    <span>👤</span>
    <span class="email" id="userEmail"></span>
    <span class="sync-status" id="syncStatus">●</span>
  </div>
  <div class="stats">
    <div class="stat"><div class="value" id="dayNum">0/22</div><div class="label">Day</div></div>
    <div class="stat"><div class="value" id="overallPct">0%</div><div class="label">Overall</div></div>
    <div class="stat"><div class="value" id="streakNum">0</div><div class="label">Streak 🔥</div></div>
    <div class="stat"><div class="value" id="bestStreakNum">0</div><div class="label">Best</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="filters">
    <div class="chip active" data-filter="all">All</div>
    <div class="chip" data-filter="sat">SAT</div>
    <div class="chip" data-filter="ielts">IELTS</div>
    <div class="chip" data-filter="today">Today</div>
    <div class="chip" data-filter="incomplete">Incomplete</div>
  </div>
  <div id="daysList"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">Day</h2>
    <div id="modalDate" style="color: var(--text-dim); font-size: 13px; margin-bottom: 16px;"></div>
    <div id="tasksList"></div>
    <div class="add-task-row">
      <input type="text" id="newTaskInput" placeholder="Add custom task..." />
      <button class="primary" onclick="addCustomTask()">Add</button>
    </div>
    <textarea class="notes" id="dayNotes" placeholder="Notes for this day..."></textarea>
    <div class="resources-section">
      <div class="resources-header">📚 Tegishli resurslar</div>
      <div id="resourcesContainer"></div>
    </div>

    <div class="modal-actions">
      <button onclick="closeModal()">Close (Esc)</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function detectResourcesForText(text) {
  if (!text) return [];
  const lower = text.toLowerCase();
  const matched = new Set();
  for (const key in RESOURCE_LIBRARY) {
    const topic = RESOURCE_LIBRARY[key];
    for (const kw of topic.keywords) {
      if (lower.includes(kw.toLowerCase())) { matched.add(key); break; }
    }
  }
  return [...matched].map(k => ({ key: k, ...RESOURCE_LIBRARY[k] }));
}

function detectResourcesForDay(idx) {
  const day = DEFAULT_PLAN[idx];
  const d = getDayData(idx);
  const allText = [day.title, ...d.tasks.map(t => t.text), ...(d.customTasks || []).map(t => t.text)].join(' ');
  return detectResourcesForText(allText);
}

function iconForType(type) {
  if (type === 'video') return '🎥';
  if (type === 'practice') return '✏️';
  return '📄';
}

function renderResources() {
  const container = document.getElementById('resourcesContainer');
  if (!container || currentDayIdx === null) return;
  const topics = detectResourcesForDay(currentDayIdx);
  if (topics.length === 0) {
    container.innerHTML = '<div class="no-resources">Bu kun uchun mos resurs topilmadi. Custom task qo\'shing (mas: "transitions", "task 2", "quadratic") — linklar avtomatik chiqadi.</div>';
    return;
  }
  container.innerHTML = topics.map(topic => `
    <div class="resource-topic">
      <div class="resource-topic-title">
        ${topic.title}
        <span class="resource-cat-badge">${topic.category}</span>
      </div>
      <div class="resource-links">
        ${topic.links.map(link => `
          <a href="${link.url}" target="_blank" rel="noopener" class="resource-link">
            <span class="resource-link-icon">${iconForType(link.type)}</span>
            <span class="resource-link-label">${link.label}</span>
            <span class="resource-external">↗</span>
          </a>
        `).join('')}
      </div>
    </div>
  `).join('');
}


let state = { data: {}, startDate: null, theme: 'dark', notifications: false, bestStreak: 0 };
let currentUser = null, currentDayIdx = null, currentFilter = 'all', saveTimer = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; await loadData(); showApp(); }
  else { showLogin(); }
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session) { currentUser = session.user; await loadData(); showApp(); }
    else if (event === 'SIGNED_OUT') { currentUser = null; showLogin(); }
  });
}

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
  if (error) toast('Login error: ' + error.message);
}

async function logout() { await sb.auth.signOut(); }

function showLogin() { document.getElementById('loginScreen').classList.remove('hidden'); document.getElementById('app').classList.add('hidden'); }

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userEmail').textContent = currentUser.email;
  applyTheme(); render();
}

async function loadData() {
  setSync('syncing');
  try {
    const { data, error } = await sb.from('habit_data').select('*').eq('user_id', currentUser.id).maybeSingle();
    if (error) throw error;
    if (data) {
      state.data = data.data || {};
      state.startDate = data.start_date || todayISO();
      state.theme = data.theme || 'dark';
      state.notifications = data.notifications || false;
      state.bestStreak = (data.data && data.data._bestStreak) || 0;
    } else { state.startDate = todayISO(); state.data = {}; await saveData(true); }
    setSync('synced');
  } catch (e) {
    console.error(e);
    const cached = localStorage.getItem('ht5_' + currentUser.id);
    if (cached) { const parsed = JSON.parse(cached); state = { ...state, ...parsed }; }
    setSync('offline');
    toast('Offline mode');
  }
}

async function saveData(immediate = false) {
  localStorage.setItem('ht5_' + currentUser.id, JSON.stringify({ data: state.data, startDate: state.startDate, theme: state.theme, notifications: state.notifications }));
  if (saveTimer) clearTimeout(saveTimer);
  const delay = immediate ? 0 : 800;
  saveTimer = setTimeout(async () => {
    setSync('syncing');
    try {
      const dataWithMeta = { ...state.data, _bestStreak: state.bestStreak };
      const { error } = await sb.from('habit_data').upsert({
        user_id: currentUser.id, data: dataWithMeta,
        start_date: state.startDate, theme: state.theme, notifications: state.notifications
      });
      if (error) throw error;
      setSync('synced');
    } catch (e) { console.error(e); setSync('offline'); }
  }, delay);
}

function setSync(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync-status ' + status;
  el.textContent = status === 'syncing' ? '⟳ syncing...' : status === 'synced' ? '✓ synced' : status === 'offline' ? '⚠ offline' : '●';
}

function todayISO() { return new Date().toISOString().slice(0, 10); }
function addDays(iso, n) { const d = new Date(iso + 'T00:00:00'); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function formatDate(iso) { const d = new Date(iso + 'T00:00:00'); return d.toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' }); }

function getDayData(idx) {
  if (!state.data[idx]) {
    state.data[idx] = { tasks: DEFAULT_PLAN[idx].tasks.map(t => ({ text: t, done: false })), customTasks: [], notes: '' };
  }
  return state.data[idx];
}

function dayProgress(idx) {
  const d = getDayData(idx);
  const all = [...d.tasks, ...(d.customTasks || [])];
  if (all.length === 0) return 0;
  return all.filter(t => t.done).length / all.length;
}

function todayIdx() {
  if (!state.startDate) return -1;
  const start = new Date(state.startDate + 'T00:00:00');
  const today = new Date(todayISO() + 'T00:00:00');
  const diff = Math.floor((today - start) / 86400000);
  return diff >= 0 && diff < 22 ? diff : -1;
}

function calcStreak() {
  let streak = 0;
  const tIdx = todayIdx();
  if (tIdx < 0) return 0;
  for (let i = tIdx; i >= 0; i--) { if (dayProgress(i) >= 1) streak++; else break; }
  if (streak > state.bestStreak) state.bestStreak = streak;
  return streak;
}

function render() {
  const tIdx = todayIdx();
  const totalTasks = DEFAULT_PLAN.reduce((s, _, i) => { const d = getDayData(i); return s + d.tasks.length + (d.customTasks?.length || 0); }, 0);
  const doneTasks = DEFAULT_PLAN.reduce((s, _, i) => { const d = getDayData(i); return s + d.tasks.filter(t => t.done).length + (d.customTasks?.filter(t => t.done).length || 0); }, 0);
  const pct = totalTasks ? Math.round((doneTasks / totalTasks) * 100) : 0;
  const streak = calcStreak();
  document.getElementById('dayNum').textContent = (tIdx + 1) + '/22';
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('streakNum').textContent = streak;
  document.getElementById('bestStreakNum').textContent = state.bestStreak;
  document.getElementById('progressFill').style.width = pct + '%';
  const list = document.getElementById('daysList');
  list.innerHTML = '';
  let lastPhase = '';
  DEFAULT_PLAN.forEach((day, idx) => {
    if (currentFilter === 'sat' && day.phase !== 'SAT') return;
    if (currentFilter === 'ielts' && day.phase !== 'IELTS') return;
    if (currentFilter === 'today' && idx !== tIdx) return;
    if (currentFilter === 'incomplete' && dayProgress(idx) >= 1) return;
    if (day.phase !== lastPhase && currentFilter === 'all') {
      const h = document.createElement('div'); h.className = 'phase-header';
      h.textContent = day.phase === 'SAT' ? '🎯 SAT Focus (12 days)' : '🌐 IELTS Focus (10 days)';
      list.appendChild(h); lastPhase = day.phase;
    }
    const prog = dayProgress(idx);
    const el = document.createElement('div');
    el.className = 'day' + (idx === tIdx ? ' today' : '') + (prog >= 1 ? ' done' : '');
    el.innerHTML = `<div class="day-header"><span class="day-title">${day.title}</span><span class="badge ${day.phase.toLowerCase()}">${day.phase}</span></div><div class="day-date">${formatDate(addDays(state.startDate, idx))} • ${Math.round(prog*100)}% done</div><div class="mini-progress"><div class="mini-fill" style="width:${prog*100}%"></div></div>`;
    el.onclick = () => openModal(idx);
    list.appendChild(el);
  });
  if (!window._scrolled && tIdx >= 0) {
    setTimeout(() => { const todayEl = list.querySelector('.day.today'); if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); window._scrolled = true; }, 100);
  }
}

function openModal(idx) {
  currentDayIdx = idx;
  const day = DEFAULT_PLAN[idx];
  const d = getDayData(idx);
  document.getElementById('modalTitle').textContent = day.title;
  document.getElementById('modalDate').textContent = formatDate(addDays(state.startDate, idx));
  renderTasks();
  document.getElementById('dayNotes').value = d.notes || '';
  document.getElementById('modal').classList.add('show');
  document.getElementById('newTaskInput').value = '';
  renderResources();
}

function renderTasks() {
  const d = getDayData(currentDayIdx);
  const list = document.getElementById('tasksList');
  list.innerHTML = '';
  d.tasks.forEach((t, i) => list.appendChild(taskEl(t, () => toggleTask(i, false))));
  (d.customTasks || []).forEach((t, i) => { list.appendChild(taskEl(t, () => toggleTask(i, true), () => deleteCustomTask(i))); });
}

function taskEl(task, onToggle, onDelete) {
  const div = document.createElement('div');
  div.className = 'task' + (task.done ? ' done' : '');
  const id = 'task_' + Math.random().toString(36).slice(2);
  div.innerHTML = `<input type="checkbox" id="${id}" ${task.done ? 'checked' : ''}><label for="${id}"></label>`;
  div.querySelector('label').textContent = task.text;
  div.querySelector('input').onchange = onToggle;
  if (onDelete) {
    const btn = document.createElement('button');
    btn.className = 'delete-task'; btn.textContent = '✕';
    btn.onclick = (e) => { e.stopPropagation(); onDelete(); };
    div.appendChild(btn);
  }
  return div;
}

function toggleTask(i, isCustom) {
  const d = getDayData(currentDayIdx);
  const arr = isCustom ? d.customTasks : d.tasks;
  arr[i].done = !arr[i].done;
  if (navigator.vibrate) navigator.vibrate(10);
  saveData(); renderTasks(); render();
  if (dayProgress(currentDayIdx) >= 1) celebrate();
}

function addCustomTask() {
  const input = document.getElementById('newTaskInput');
  const text = input.value.trim();
  if (!text) return;
  const d = getDayData(currentDayIdx);
  if (!d.customTasks) d.customTasks = [];
  d.customTasks.push({ text, done: false });
  input.value = '';
  saveData(); renderTasks(); render(); renderResources();
}

function deleteCustomTask(i) {
  const d = getDayData(currentDayIdx);
  d.customTasks.splice(i, 1);
  saveData(); renderTasks(); render(); renderResources();
}

function closeModal() {
  if (currentDayIdx !== null) {
    const d = getDayData(currentDayIdx);
    d.notes = document.getElementById('dayNotes').value;
    saveData();
  }
  document.getElementById('modal').classList.remove('show');
  currentDayIdx = null;
}

function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
function celebrate() { toast('🎉 Day complete!'); if (navigator.vibrate) navigator.vibrate([50, 30, 50]); }
function applyTheme() { document.documentElement.setAttribute('data-theme', state.theme); document.getElementById('themeBtn').textContent = state.theme === 'dark' ? '🌙' : '☀️'; }
function toggleTheme() { state.theme = state.theme === 'dark' ? 'light' : 'dark'; applyTheme(); saveData(); }

async function toggleNotif() {
  if (!('Notification' in window)) { toast('Notifications not supported'); return; }
  if (Notification.permission === 'default') {
    const p = await Notification.requestPermission();
    if (p !== 'granted') { toast('Permission denied'); return; }
  }
  state.notifications = !state.notifications;
  document.getElementById('notifBtn').textContent = state.notifications ? '🔔' : '🔕';
  toast(state.notifications ? 'Notifications ON' : 'Notifications OFF');
  saveData();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 't' || e.key === 'T') toggleTheme();
  if (e.key === 'n' || e.key === 'N') toggleNotif();
});

document.getElementById('themeBtn').onclick = toggleTheme;
document.getElementById('notifBtn').onclick = toggleNotif;

document.querySelectorAll('.chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  };
});

document.getElementById('newTaskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addCustomTask(); });
document.getElementById('dayNotes').addEventListener('blur', () => {
  if (currentDayIdx !== null) { getDayData(currentDayIdx).notes = document.getElementById('dayNotes').value; saveData(); }
});

sb.channel('habit_changes')
  .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'habit_data' }, async (payload) => {
    if (currentUser && payload.new.user_id === currentUser.id) {
      const localUpdated = localStorage.getItem('ht5_' + currentUser.id + '_lastWrite');
      if (localUpdated && Date.now() - parseInt(localUpdated) < 2000) return;
      state.data = payload.new.data || {};
      render();
      toast('🔄 Synced from another device');
    }
  })
  .subscribe();

setInterval(() => {
  if (!state.notifications) return;
  const now = new Date();
  if (now.getHours() === 9 && now.getMinutes() === 0 && Notification.permission === 'granted') {
    const tIdx = todayIdx();
    if (tIdx >= 0 && dayProgress(tIdx) < 1) {
      new Notification('📚 SAT+IELTS Tracker', { body: `Bugun: ${DEFAULT_PLAN[tIdx].title}. Boshla!` });
    }
  }
}, 60000);

init();
</script>
</body>
</html>
