<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#0f0f0f">
<title>SAT + IELTS Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
    --border: #2e2e2e; --border2: #3a3a3a;
    --text: #f0f0f0; --muted: #555; --muted2: #888;
    --green: #4ade80; --green-bg: #0d2818; --green-border: #1a4a2e;
    --blue: #60a5fa; --blue-bg: #0d1f3a; --blue-border: #1a3a6e;
    --amber: #fbbf24; --amber-bg: #1a1200; --amber-border: #3a2e00;
    --purple: #a78bfa; --purple-bg: #1a0d3a; --purple-border: #2e1a6e;
    --red: #f87171;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  [data-theme="light"] {
    --bg: #fafafa; --surface: #ffffff; --surface2: #f0f0f0;
    --border: #e5e5e5; --border2: #d4d4d4;
    --text: #1a1a1a; --muted: #999; --muted2: #666;
    --green: #16a34a; --green-bg: #dcfce7; --green-border: #86efac;
    --blue: #2563eb; --blue-bg: #dbeafe; --blue-border: #93c5fd;
    --amber: #d97706; --amber-bg: #fef3c7; --amber-border: #fcd34d;
    --purple: #7c3aed; --purple-bg: #ede9fe; --purple-border: #c4b5fd;
    --red: #dc2626;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; padding: 1.5rem 1rem 4rem;
    transition: background 0.3s, color 0.3s;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 980px; margin: 0 auto; }

  /* Header */
  header { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }
  .header-left h1 { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--muted2); margin-top: 4px; font-family: 'DM Mono', monospace; }
  .header-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .icon-btn:hover { background: var(--surface2); border-color: var(--border2); }
  .icon-btn:active { transform: scale(0.95); }
  .icon-btn.active { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }

  /* Stats */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 1rem 0; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    transition: transform 0.15s, border-color 0.15s;
  }
  .stat-card:hover { transform: translateY(-1px); border-color: var(--border2); }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; line-height: 1.1; }
  .stat-val.green { color: var(--green); }
  .stat-val.blue { color: var(--blue); }
  .stat-val.amber { color: var(--amber); }
  .stat-val.red { color: var(--red); }
  .stat-label { font-size: 11px; color: var(--muted2); margin-top: 4px; }

  /* Progress */
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--muted2);
    font-family: 'DM Mono', monospace; margin-bottom: 6px;
  }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), var(--blue));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 2px;
  }

  /* Filter bar */
  .filter-bar { display: flex; gap: 6px; margin-bottom: 1.25rem; overflow-x: auto; padding-bottom: 4px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted2); padding: 6px 12px; border-radius: 999px;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    transition: all 0.15s; font-family: inherit;
  }
  .filter-chip:hover { border-color: var(--border2); color: var(--text); }
  .filter-chip.active { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }

  /* Phases */
  .phase { margin-bottom: 2rem; }
  .phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .phase-tag {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 4px 10px; border-radius: 3px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .phase-tag.sat { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
  .phase-tag.ielts { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .phase-dates { font-size: 12px; color: var(--muted2); font-family: 'DM Mono', monospace; }

  .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }

  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative; outline: none;
  }
  .day-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
  .day-card:focus-visible { border-color: var(--blue); box-shadow: 0 0 0 2px var(--blue-bg); }
  .day-card.done {
    background: var(--green-bg); border-color: var(--green-border);
    animation: doneFlash 0.6s ease;
  }
  @keyframes doneFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); box-shadow: 0 0 20px var(--green-border); }
    100% { transform: scale(1); }
  }
  .day-card.today {
    border-color: var(--blue); border-width: 1.5px;
    box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
  }
  .day-card.today::before {
    content: ''; position: absolute; inset: -1px;
    border-radius: 10px; padding: 1.5px;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none; opacity: 0.5;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
  .day-card.past-undone { opacity: 0.35; }
  .day-card.future { opacity: 0.75; }

  .day-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1px; }
  .day-num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .day-card.done .day-num { color: var(--green); }
  .day-month { font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; }
  .day-wd { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .today-tag {
    position: absolute; top: 8px; right: 8px;
    font-size: 9px; color: var(--blue); font-family: 'DM Mono', monospace;
    font-weight: 500; letter-spacing: 0.06em;
  }
  .day-progress-mini {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 2px; background: var(--border); border-radius: 0 0 9px 9px;
    overflow: hidden;
  }
  .day-progress-mini-fill {
    height: 100%; background: var(--green);
    transition: width 0.4s ease;
  }

  .task-pills { display: flex; flex-direction: column; gap: 3px; }
  .pill {
    font-size: 10px; padding: 3px 7px; border-radius: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    transition: opacity 0.2s;
  }
  .pill.sat-e { background: var(--blue-bg); color: #93c5fd; }
  .pill.sat-m { background: var(--purple-bg); color: #c4b5fd; }
  .pill.ielts { background: var(--amber-bg); color: #fcd34d; }
  .pill.custom { background: var(--surface2); color: var(--muted2); border: 1px dashed var(--border2); }
  .pill.done-pill {
    background: var(--green-bg); color: #86efac;
    text-decoration: line-through; opacity: 0.55;
  }
  [data-theme="light"] .pill.sat-e { color: #1e40af; }
  [data-theme="light"] .pill.sat-m { color: #6d28d9; }
  [data-theme="light"] .pill.ielts { color: #92400e; }
  [data-theme="light"] .pill.done-pill { color: #166534; }

  /* Modal */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
    padding: 1rem; animation: fadeIn 0.2s ease;
  }
  .overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; padding: 1.25rem;
    width: 100%; max-width: 420px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow);
    animation: modalSlide 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes modalSlide {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .m-header { flex-shrink: 0; margin-bottom: 1rem; }
  .m-date { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; }
  .m-sub { font-size: 12px; color: var(--muted2); margin-top: 3px; font-family: 'DM Mono', monospace; }

  .m-body { flex: 1; overflow-y: auto; margin: 0 -0.5rem; padding: 0 0.5rem; }
  .m-body::-webkit-scrollbar { width: 4px; }
  .m-body::-webkit-scrollbar-track { background: transparent; }
  .m-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .m-section { margin-bottom: 1rem; }
  .m-section-title {
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); font-family: 'DM Mono', monospace;
    margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .m-section-count { color: var(--muted2); font-weight: 500; }

  .m-task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    transition: opacity 0.2s;
  }
  .m-task:last-child { border-bottom: none; }
  .m-check {
    width: 20px; height: 20px; border-radius: 5px;
    border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .m-check:hover { border-color: var(--green); }
  .m-check.on {
    background: var(--green); border-color: var(--green);
    transform: scale(1.05);
  }
  .m-check.on::after {
    content: '✓'; font-size: 13px; color: #000; font-weight: 700;
    animation: checkPop 0.3s ease;
  }
  @keyframes checkPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .m-task-content { flex: 1; min-width: 0; }
  .m-task-label { font-size: 13px; line-height: 1.45; cursor: pointer; word-wrap: break-word; }
  .m-task.checked .m-task-label { color: var(--muted2); text-decoration: line-through; }
  .m-task-link {
    display: inline-block; margin-top: 4px;
    font-size: 11px; color: var(--blue); text-decoration: none;
    font-family: 'DM Mono', monospace;
  }
  .m-task-link:hover { text-decoration: underline; }
  .m-task-tip {
    font-size: 11px; color: var(--muted2); margin-top: 4px;
    line-height: 1.45;
  }
  .m-task-note {
    margin-top: 6px; width: 100%;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px;
    font-family: inherit; font-size: 12px; color: var(--text);
    resize: vertical; min-height: 32px; max-height: 100px;
    transition: border-color 0.15s;
  }
  .m-task-note:focus { outline: none; border-color: var(--blue); }
  .m-task-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 4px; font-size: 14px;
    flex-shrink: 0; transition: color 0.15s;
  }
  .m-task-delete:hover { color: var(--red); }

  .m-add-task {
    width: 100%; margin-top: 6px; padding: 8px;
    background: transparent; border: 1px dashed var(--border2);
    border-radius: 6px; color: var(--muted2); font-size: 12px;
    cursor: pointer; font-family: inherit;
    transition: all 0.15s;
  }
  .m-add-task:hover { border-color: var(--blue); color: var(--blue); }

  .m-footer {
    display: flex; gap: 8px; margin-top: 1rem;
    flex-shrink: 0; padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn {
    flex: 1; padding: 10px; border-radius: 8px;
    font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border2);
    background: transparent; color: var(--text);
    transition: all 0.15s;
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn.g { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
  .btn.g:hover { background: var(--green-border); }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface); border: 1px solid var(--border2);
    color: var(--text); padding: 10px 16px; border-radius: 999px;
    font-size: 13px; box-shadow: var(--shadow);
    z-index: 300; opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green-border); color: var(--green); }

  /* Confetti container */
  .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 250; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 8px; height: 8px;
    animation: confettiFall 2.5s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* MOBILE RESPONSIVE */
  @media (max-width: 640px) {
    body { padding: 1rem 0.75rem 3rem; }
    header { flex-direction: row; align-items: center; gap: 0.5rem; }
    .header-left h1 { font-size: 17px; }
    .header-sub { font-size: 11px; }
    .icon-btn { width: 34px; height: 34px; font-size: 14px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .stat-val { font-size: 17px; }
    .stat-label { font-size: 10px; }
    .days-grid { grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 6px; }
    .day-card { padding: 9px; border-radius: 8px; }
    .day-num { font-size: 16px; }
    .day-month, .day-wd { font-size: 10px; }
    .pill { font-size: 9px; padding: 2px 5px; }
    .filter-chip { font-size: 11px; padding: 5px 10px; }
    .modal { padding: 1rem; border-radius: 12px; max-height: 92vh; }
    .m-date { font-size: 16px; }
    .btn { padding: 11px; font-size: 13px; }
    .phase-header { gap: 6px; }
    .phase-tag { font-size: 9px; padding: 3px 8px; }
    .phase-dates { font-size: 11px; }
  }

  @media (max-width: 380px) {
    .days-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>SAT + IELTS Tracker</h1>
      <div class="header-sub" id="header-sub"></div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-theme" title="Tema (T)" aria-label="Tema almashtirish">🌙</button>
      <button class="icon-btn" id="btn-notif" title="Eslatma (N)" aria-label="Eslatma">🔔</button>
      <button class="icon-btn" id="btn-reset" title="Tozalash" aria-label="Hammasini tozalash">↺</button>
    </div>
  </header>

  <div class="stats-row" id="stats"></div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="p-label"></span>
      <span id="p-pct"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>
  </div>

  <div class="filter-bar" role="tablist">
    <button class="filter-chip active" data-filter="all" role="tab">Hammasi</button>
    <button class="filter-chip" data-filter="today" role="tab">Bugun</button>
    <button class="filter-chip" data-filter="undone" role="tab">Bajarilmagan</button>
    <button class="filter-chip" data-filter="done" role="tab">Bajarilgan</button>
  </div>

  <div id="phases"></div>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="m-date">
  <div class="modal">
    <div class="m-header">
      <div class="m-date" id="m-date"></div>
      <div class="m-sub" id="m-sub"></div>
    </div>
    <div class="m-body" id="m-body"></div>
    <div class="m-footer">
      <button class="btn" id="btn-close">Yopish (Esc)</button>
      <button class="btn g" id="btn-all">Barchasini ✓</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confetti" id="confetti"></div>

<script>
'use strict';

// ============ CONSTANTS ============
const MONTHS = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
const MONTHS_FULL = ['yanvar','fevral','mart','aprel','may','iyun','iyul','avgust','sentabr','oktabr','noyabr','dekabr'];
const WD = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const WDS = ['Yak','Dush','Sesh','Chor','Pay','Jum','Shan'];

// Sanani avtomatik hisoblash — kelajakdagi 22 kun
function getStartDate() {
  const saved = localStorage.getItem('ht5_start');
  if (saved) return new Date(parseInt(saved));
  const d = new Date(); d.setHours(0,0,0,0);
  localStorage.setItem('ht5_start', d.getTime().toString());
  return d;
}

// ============ TASK BANKS ============
const SAT_ENGLISH = [
  { label: 'Grammar: Tenses — 20 ta savol', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Standard English Conventions > Verb tenses' },
  { label: 'Grammar: Subject-verb agreement', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Standard English Conventions > Agreement' },
  { label: 'Grammar: Punctuation & structure', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Standard English Conventions > Punctuation' },
  { label: 'Grammar: Pronouns & modifiers', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Standard English Conventions > Pronouns' },
  { label: 'Grammar: Transitions & rhetoric', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Expression of Ideas > Transitions' },
  { label: 'SAT Reading: 1 ta to\u2019liq passage', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Reading > Information & Ideas' },
  { label: 'Grammar: Mixed test — 25 savol', type: 'sat-e', url: 'https://www.oneprep.xyz/question-rush', tip: 'Question Rush — timed mode ni yoq' },
  { label: 'SAT Reading: Inference savollar', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Reading > Inference' },
  { label: 'Grammar: Word choice & concision', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Expression of Ideas > Word choice' },
  { label: 'SAT Reading: Timed passage (9 min)', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Stopwatch qo\u2019y, 9 daqiqada 1 passage tugat' },
  { label: 'Grammar: Parallel structure', type: 'sat-e', url: 'https://www.oneprep.xyz/question-bank', tip: 'Filter: Writing > Standard English Conventions' },
  { label: 'SAT English: Full section mock', type: 'sat-e', url: 'https://www.oneprep.xyz/predicted-papers', tip: 'To\u2019liq test — rasmiy vaqt bilan' },
];

const SAT_ENGLISH2 = [

// ============ STATE ============
const START = getStartDate();
const PHASE1_LEN = 12; // First 12 days = SAT focus
const TOTAL_DAYS = 22;

const days = [];
for (let i = 0; i < TOTAL_DAYS; i++) {
  const d = new Date(START);
  d.setDate(START.getDate() + i);
  const isPhase1 = i < PHASE1_LEN;
  days.push({ date: d, isPhase1, idx: i, tasks: getDayTasks(i, isPhase1) });
}

function getDayTasks(idx, isPhase1) {
  if (isPhase1) {
    return [
      SAT_ENGLISH[idx % SAT_ENGLISH.length],
      SAT_ENGLISH2[idx % SAT_ENGLISH2.length],
      SAT_MATH[idx % SAT_MATH.length],
      SAT_MATH2[idx % SAT_MATH2.length],
      IELTS_TASKS[idx % IELTS_TASKS.length],
    ];
  }
  return [0,1,2,3,4].map(i => IELTS_TASKS[(idx * 5 + i) % IELTS_TASKS.length]);
}

let todayDate = new Date(); todayDate.setHours(0,0,0,0);
let openIdx = null;
let currentFilter = 'all';

// ============ DATE HELPERS ============
function dayKey(date) {
  const x = new Date(date); x.setHours(0,0,0,0);
  return x.getTime();
}
function isToday(d) { return dayKey(d) === dayKey(todayDate); }
function isPast(d) { return dayKey(d) < dayKey(todayDate); }
function isFuture(d) { return dayKey(d) > dayKey(todayDate); }

// Tunni kuzatib turish — kun o'zgarsa yangilash
setInterval(() => {
  const now = new Date(); now.setHours(0,0,0,0);
  if (now.getTime() !== todayDate.getTime()) {
    todayDate = now;
    render();
  }
}, 60000);

// ============ STORAGE ============
const KEY = 'ht5';
function loadAll() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {}; }
  catch(e) { return {}; }
}
function saveAll(data) {
  try { localStorage.setItem(KEY, JSON.stringify(data)); return true; }
  catch(e) { toast('Saqlashda xato — joy yetmagan', 'error'); return false; }
}
function getDay(i) {
  const all = loadAll();
  return all['d' + i] || { checked: [], notes: {}, custom: [] };
}
function setDay(i, dayData) {
  const all = loadAll();
  all['d' + i] = dayData;
  saveAll(all);
}
function getAllTasks(i) {
  return [...days[i].tasks, ...(getDay(i).custom || [])];
}
function isDayDone(i) {
  const d = getDay(i);
  const total = days[i].tasks.length + (d.custom?.length || 0);
  return total > 0 && d.checked.length >= total;
}

// ============ STATS ============
function calcStats() {
  let doneDays = 0, doneTasks = 0, totalTasks = 0;
  days.forEach((_, i) => {
    if (isDayDone(i)) doneDays++;
    const d = getDay(i);
    doneTasks += d.checked.length;
    totalTasks += days[i].tasks.length + (d.custom?.length || 0);
  });

  // Streak — only counts past + today
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    if (isFuture(days[i].date)) continue;
    if (isDayDone(i)) streak++;
    else if (isPast(days[i].date)) break;
    else break; // today undone
  }

  // Best streak
  let best = 0, current = 0;
  days.forEach((day, i) => {
    if (isFuture(day.date)) return;
    if (isDayDone(i)) { current++; if (current > best) best = current; }
    else current = 0;
  });

  return { doneDays, doneTasks, totalTasks, streak, best };
}

// ============ RENDER ============
function render() {
  const stats = calcStats();
  const pct = days.length ? Math.round(stats.doneDays / days.length * 100) : 0;

  // Header sub — sana oralig'i
  const startStr = `${START.getDate()}-${MONTHS[START.getMonth()]}`;
  const endStr = `${days[days.length-1].date.getDate()}-${MONTHS[days[days.length-1].date.getMonth()]}`;
  document.getElementById('header-sub').textContent = `${startStr} — ${endStr} · ${TOTAL_DAYS} kun`;

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-val green">${stats.doneDays}</div><div class="stat-label">Kun bajarildi</div></div>
    <div class="stat-card"><div class="stat-val blue">${stats.doneTasks}/${stats.totalTasks}</div><div class="stat-label">Vazifalar</div></div>
    <div class="stat-card"><div class="stat-val amber">${stats.streak > 0 ? stats.streak + ' 🔥' : '0'}</div><div class="stat-label">Streak (best: ${stats.best})</div></div>
    <div class="stat-card"><div class="stat-val red">${Math.max(0, days.length - stats.doneDays)}</div><div class="stat-label">Qolgan kun</div></div>
  `;

  // Progress
  document.getElementById('p-fill').style.width = pct + '%';
  document.getElementById('p-label').textContent = `${stats.doneDays} / ${days.length} kun`;
  document.getElementById('p-pct').textContent = pct + '%';

  // Phases
  const p1 = days.filter(d => d.isPhase1);
  const p2 = days.filter(d => !d.isPhase1);
  const phases = [
    { label: 'SAT Focus', dates: phaseRange(p1), tag: 'sat', days: p1, offset: 0 },
    { label: 'IELTS Focus', dates: phaseRange(p2), tag: 'ielts', days: p2, offset: p1.length }
  ];

  const phasesEl = document.getElementById('phases');
  phasesEl.innerHTML = '';
  phases.forEach(ph => {
    const el = document.createElement('div');
    el.className = 'phase';
    el.innerHTML = `<div class="phase-header">
      <span class="phase-tag ${ph.tag}">${ph.label}</span>
      <span class="phase-dates">${ph.dates}</span>
    </div><div class="days-grid" id="g${ph.offset}"></div>`;
    phasesEl.appendChild(el);
    const grid = el.querySelector('.days-grid');

    ph.days.forEach((day, j) => {
      const i = ph.offset + j;

      // Filter
      if (currentFilter === 'today' && !isToday(day.date)) return;
      if (currentFilter === 'done' && !isDayDone(i)) return;
      if (currentFilter === 'undone' && isDayDone(i)) return;

      const d = getDay(i);
      const totalT = days[i].tasks.length + (d.custom?.length || 0);
      const done = isDayDone(i);
      const tod = isToday(day.date);
      const past = isPast(day.date);
      const fut = isFuture(day.date);

      const card = document.createElement('div');
      card.className = 'day-card'
        + (done ? ' done' : '')
        + (tod ? ' today' : '')
        + (past && !done ? ' past-undone' : '')
        + (fut ? ' future' : '');
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `${day.date.getDate()} ${MONTHS_FULL[day.date.getMonth()]}, ${d.checked.length} ta bajarildi ${totalT} dan`);
      card.onclick = () => openModal(i);
      card.onkeydown = e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(i); }
      };

      const dd = day.date.getDate();
      const mm = MONTHS[day.date.getMonth()];
      const wd = WDS[day.date.getDay()];
      const all = getAllTasks(i);
      const pills = all.map((t, ti) => {
        const checked = d.checked.includes(ti);
        const type = t.custom ? 'custom' : t.type;
        return `<div class="pill ${checked ? 'done-pill' : type}" title="${escapeHtml(t.label)}">${escapeHtml(t.label)}</div>`;
      }).join('');

      const miniPct = totalT > 0 ? (d.checked.length / totalT) * 100 : 0;

      card.innerHTML = `
        ${tod ? '<div class="today-tag">BUGUN</div>' : ''}
        <div class="day-head"><div class="day-num">${dd}</div><div class="day-month">${mm}</div></div>
        <div class="day-wd">${wd}</div>
        <div class="task-pills">${pills}</div>
        ${!done && d.checked.length > 0 ? `<div class="day-progress-mini"><div class="day-progress-mini-fill" style="width:${miniPct}%"></div></div>` : ''}
      `;
      grid.appendChild(card);
    });
  });

  // 100% celebration
  if (pct === 100 && !localStorage.getItem('ht5_celebrated')) {
    localStorage.setItem('ht5_celebrated', '1');
    confetti();
    toast('🎉 Tabriklayman! Hammasini tugatding!', 'success');
  }
}

function phaseRange(arr) {
  if (!arr.length) return '';
  const a = arr[0].date, b = arr[arr.length-1].date;
  return `${a.getDate()}-${MONTHS[a.getMonth()]} — ${b.getDate()}-${MONTHS[b.getMonth()]}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ MODAL ============
function openModal(i) {
  openIdx = i;
  const day = days[i];
  const d = getDay(i);
  const all = getAllTasks(i);

  document.getElementById('m-date').textContent = `${day.date.getDate()} ${MONTHS_FULL[day.date.getMonth()]}`;
  document.getElementById('m-sub').textContent = `${WD[day.date.getDay()]} · ${day.isPhase1 ? 'SAT Focus' : 'IELTS Focus'} · ${d.checked.length}/${all.length}`;

  let sections;
  if (day.isPhase1) {
    sections = [
      { title: 'SAT English', range: [0, 2] },
      { title: 'SAT Math', range: [2, 4] },
      { title: 'IELTS', range: [4, 5] },
    ];
  } else {
    sections = [{ title: 'IELTS', range: [0, 5] }];
  }
  // Custom tasks section
  if (d.custom && d.custom.length) {
    sections.push({ title: 'Qo\u2019shimcha', range: [5, 5 + d.custom.length], isCustom: true });
  }

  let html = '';
  sections.forEach(sec => {
    const start = sec.range[0], endR = sec.range[1];
    const sectionTasks = all.slice(start, endR);
    if (!sectionTasks.length) return;
    const doneInSec = sectionTasks.filter((_, j) => d.checked.includes(start + j)).length;
    html += `<div class="m-section">
      <div class="m-section-title">
        <span>${sec.title}</span>
        <span class="m-section-count">${doneInSec}/${sectionTasks.length}</span>
      </div>`;
    sectionTasks.forEach((t, j) => {
      const ti = start + j;
      const on = d.checked.includes(ti);
      const note = d.notes?.[ti] || '';
      html += `<div class="m-task${on ? ' checked' : ''}" data-ti="${ti}">
        <div class="m-check${on ? ' on' : ''}" data-toggle="${ti}" role="checkbox" aria-checked="${on}" tabindex="0"></div>
        <div class="m-task-content">
          <div class="m-task-label" data-toggle="${ti}">${escapeHtml(t.label)}</div>
          ${t.url ? `<a class="m-task-link" href="${escapeHtml(t.url)}" target="_blank" rel="noopener">→ Ochish</a>` : ''}
          ${t.tip ? `<div class="m-task-tip">💡 ${escapeHtml(t.tip)}</div>` : ''}
          <textarea class="m-task-note" data-note="${ti}" placeholder="Izoh yoz..." rows="1">${escapeHtml(note)}</textarea>
        </div>
        ${sec.isCustom ? `<button class="m-task-delete" data-delete="${ti}" title="O\u2019chirish">✕</button>` : ''}
      </div>`;
    });
    html += `</div>`;
  });

  html += `<button class="m-add-task" id="m-add">+ Qo\u2019shimcha vazifa qo\u2019shish</button>`;

  document.getElementById('m-body').innerHTML = html;
  document.getElementById('overlay').classList.add('open');

  // Event delegation
  const body = document.getElementById('m-body');
  body.querySelectorAll('[data-toggle]').forEach(el => {
    el.onclick = () => toggle(i, parseInt(el.dataset.toggle));
    if (el.classList.contains('m-check')) {
      el.onkeydown = e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          toggle(i, parseInt(el.dataset.toggle));
        }
      };
    }
  });
  body.querySelectorAll('[data-note]').forEach(el => {
    el.oninput = () => {
      const ti = parseInt(el.dataset.note);
      const dd = getDay(i);
      dd.notes = dd.notes || {};
      dd.notes[ti] = el.value;
      setDay(i, dd);
    };
  });
  body.querySelectorAll('[data-delete]').forEach(el => {
    el.onclick = () => {
      const ti = parseInt(el.dataset.delete);
      const dd = getDay(i);
      const customIdx = ti - days[i].tasks.length;
      dd.custom.splice(customIdx, 1);
      // Re-index checked
      dd.checked = dd.checked.filter(c => c !== ti).map(c => c > ti ? c - 1 : c);
      // Re-index notes
      const newNotes = {};
      Object.keys(dd.notes || {}).forEach(k => {
        const kn = parseInt(k);
        if (kn < ti) newNotes[kn] = dd.notes[k];
        else if (kn > ti) newNotes[kn - 1] = dd.notes[k];
      });
      dd.notes = newNotes;
      setDay(i, dd);
      openModal(i);
      render();
    };
  });
  document.getElementById('m-add').onclick = () => {
    const label = prompt('Vazifa nomi:');
    if (!label || !label.trim()) return;
    const dd = getDay(i);
    dd.custom = dd.custom || [];
    dd.custom.push({ label: label.trim(), type: 'custom', custom: true, url: '', tip: '' });
    setDay(i, dd);
    openModal(i);
    render();
  };
}

function toggle(i, ti) {
  const d = getDay(i);
  const idx = d.checked.indexOf(ti);
  const wasDone = isDayDone(i);
  if (idx === -1) d.checked.push(ti);
  else d.checked.splice(idx, 1);
  setDay(i, d);

  const nowDone = isDayDone(i);
  if (!wasDone && nowDone) {
    toast('Kun tugadi! 🎯', 'success');
    if (navigator.vibrate) navigator.vibrate(50);
  } else if (idx === -1 && navigator.vibrate) {
    navigator.vibrate(15);
  }

  openModal(i);
  render();
}

function markAll() {
  if (openIdx === null) return;
  const i = openIdx;
  const all = getAllTasks(i);
  const d = getDay(i);
  d.checked = all.map((_, j) => j);
  setDay(i, d);
  toast('Hammasi belgilandi ✓', 'success');
  if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
  openModal(i);
  render();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  openIdx = null;
}

// ============ TOAST ============
let toastTimer = null;
function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type === 'success' ? ' success' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2200);
}

// ============ CONFETTI ============
function confetti() {
  const c = document.getElementById('confetti');
  const colors = ['#4ade80', '#60a5fa', '#fbbf24', '#a78bfa', '#f87171'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.background = colors[i % colors.length];
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = (Math.random() * 0.3) + 's';
    p.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    c.appendChild(p);
  }
  setTimeout(() => { c.innerHTML = ''; }, 3500);
}

// ============ THEME ============
function initTheme() {
  const saved = localStorage.getItem('ht5_theme');
  const sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  const theme = saved || sys;
  setTheme(theme);
}
function setTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem('ht5_theme', t);
  document.getElementById('btn-theme').textContent = t === 'light' ? '☀️' : '🌙';
  document.querySelector('meta[name="theme-color"]').content = t === 'light' ? '#fafafa' : '#0f0f0f';
}

// ============ NOTIFICATIONS ============
async function toggleNotif() {
  if (!('Notification' in window)) {
    toast('Brauzer eslatmani qo\u2019llab-quvvatlamaydi');
    return;
  }
  if (Notification.permission === 'granted') {
    localStorage.removeItem('ht5_notif');
    document.getElementById('btn-notif').classList.remove('active');
    toast('Eslatma o\u2019chirildi');
    return;
  }
  const p = await Notification.requestPermission();
  if (p === 'granted') {
    localStorage.setItem('ht5_notif', '1');
    document.getElementById('btn-notif').classList.add('active');
    toast('Eslatma yoqildi 🔔', 'success');
    new Notification('SAT + IELTS Tracker', { body: 'Eslatma yoqildi! Har kuni 09:00 da yodga solaman.' });
  }
}
function checkNotifSchedule() {
  if (localStorage.getItem('ht5_notif') !== '1') return;
  if (Notification.permission !== 'granted') return;
  const last = localStorage.getItem('ht5_notif_last');
  const todayStr = todayDate.toDateString();
  if (last === todayStr) return;
  const now = new Date();
  if (now.getHours() < 9) return;
  // Find today's day
  const todayI = days.findIndex(d => isToday(d.date));
  if (todayI === -1) return;
  if (isDayDone(todayI)) return;
  new Notification('SAT + IELTS Tracker', {
    body: 'Bugungi vazifalaring kutmoqda 📚',
    icon: ''
  });
  localStorage.setItem('ht5_notif_last', todayStr);
}

// ============ INIT ============
function init() {
  initTheme();
  render();
  if (localStorage.getItem('ht5_notif') === '1' && Notification.permission === 'granted') {
    document.getElementById('btn-notif').classList.add('active');
  }
  checkNotifSchedule();
  setInterval(checkNotifSchedule, 10 * 60 * 1000); // har 10 daqiqada

  // Today's card ga scroll qil
  setTimeout(() => {
    const todayCard = document.querySelector('.day-card.today');
    if (todayCard) todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

// ============ EVENT LISTENERS ============
document.getElementById('overlay').onclick = function(e) {
  if (e.target === this) closeModal();
};
document.getElementById('btn-close').onclick = closeModal;
document.getElementById('btn-all').onclick = markAll;
document.getElementById('btn-theme').onclick = () => {
  setTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
};
document.getElementById('btn-notif').onclick = toggleNotif;
document.getElementById('btn-reset').onclick = () => {
  if (confirm('Hammasini tozalashga ishonchingiz komilmi? Bu amalni qaytarib bo\u2019lmaydi.')) {
    localStorage.removeItem(KEY);
    localStorage.removeItem('ht5_celebrated');
    toast('Hammasi tozalandi');
    render();
  }
};
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  };
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'Escape' && openIdx !== null) closeModal();
  if (e.key === 't' || e.key === 'T') setTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
  if (e.key === 'n' || e.key === 'N') toggleNotif();
});

init();
</script>
</body>
</html>
